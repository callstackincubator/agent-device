name: Replay Nightly

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly-android:
    name: Android Replay Suite
    runs-on: ubuntu-latest
    timeout-minutes: 80
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup toolchain
        uses: ./.github/actions/setup-node-pnpm

      - name: Resolve agent-device home
        id: android-agent-home
        run: echo "dir=$HOME/.agent-device" >> "$GITHUB_OUTPUT"

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android replay suite
        uses: reactivecircus/android-emulator-runner@b530d96654c385303d652368551fb075bc2f0b6b # v2.35.0
        with:
          api-level: 36
          arch: x86_64
          profile: pixel_7
          target: google_apis_playstore
          emulator-options: -no-window -gpu swiftshader_indirect -no-snapshot -noaudio -no-boot-anim -no-metrics
          script: node --experimental-strip-types src/bin.ts test test/integration/replays/android --retries 3 --report-junit test/artifacts/replays-android.junit.xml

      - name: Upload Android artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: replay-nightly-android-artifacts
          if-no-files-found: ignore
          path: |
            ${{ steps.android-agent-home.outputs.dir }}/daemon.log
            ${{ steps.android-agent-home.outputs.dir }}/logs/**
            ${{ steps.android-agent-home.outputs.dir }}/sessions/**
            test/artifacts/**
            test/screenshots/**

  nightly-ios:
    name: iOS Replay Suite
    runs-on: macos-26
    timeout-minutes: 80
    continue-on-error: true
    env:
      IOS_RUNTIME_VERSION: "26.2"
      AGENT_DEVICE_IOS_RUNNER_DERIVED_PATH: ${{ github.workspace }}/.tmp/ios-runner-derived
      AGENT_DEVICE_IOS_SIMCTL_LIST_TIMEOUT_MS: "60000"
      AGENT_DEVICE_IOS_BOOT_TIMEOUT_MS: "180000"
      AGENT_DEVICE_IOS_APP_LAUNCH_TIMEOUT_MS: "60000"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup toolchain
        uses: ./.github/actions/setup-node-pnpm

      - name: Resolve Xcode cache key
        id: xcode
        run: |
          set -euo pipefail
          XCODE_VERSION="$(xcodebuild -version | tr '\n' ' ' | sed -E 's/[[:space:]]+/ /g; s/[[:space:]]$//')"
          XCODE_KEY="$(echo "$XCODE_VERSION" | tr ' ' '-' | tr -cd '[:alnum:]._-')"
          echo "key=$XCODE_KEY" >> "$GITHUB_OUTPUT"

      - name: Resolve prebuild source hash
        id: source-hash
        run: |
          set -euo pipefail
          echo "value=${{ hashFiles('ios-runner/**', 'package.json', 'pnpm-lock.yaml') }}" >> "$GITHUB_OUTPUT"

      - name: Cache iOS runner prebuilt
        id: restore-prebuilt
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.3
        with:
          path: ${{ env.AGENT_DEVICE_IOS_RUNNER_DERIVED_PATH }}
          key: ios-runner-prebuilt-${{ steps.xcode.outputs.key }}-ios-${{ env.IOS_RUNTIME_VERSION }}-${{ steps.source-hash.outputs.value }}

      - name: Resolve agent-device home
        id: ios-agent-home
        run: echo "dir=$HOME/.agent-device" >> "$GITHUB_OUTPUT"

      - name: Build iOS integration artifacts
        if: steps.restore-prebuilt.outputs.cache-hit != 'true'
        env:
          AGENT_DEVICE_XCUITEST_PLATFORM: ios
          AGENT_DEVICE_XCUITEST_DESTINATION: platform=iOS Simulator,name=iPhone 17 Pro,OS=${{ env.IOS_RUNTIME_VERSION }}
          AGENT_DEVICE_IOS_CLEAN_DERIVED: "1"
        run: |
          sh ./scripts/build-xcuitest-apple.sh

      - name: Resolve and boot iOS test simulator
        run: |
          set -euo pipefail
          RUNTIME_TOKEN="SimRuntime.iOS-${IOS_RUNTIME_VERSION//./-}"
          export RUNTIME_TOKEN
          UDID="$(
            xcrun simctl list devices -j | node -e '
              const fs = require("node:fs");
              const runtimeToken = process.env.RUNTIME_TOKEN;
              const payload = JSON.parse(fs.readFileSync(0, "utf8"));
              const entries = Object.entries(payload.devices ?? {});
              const iosRuntimes = entries.filter(([runtime]) => runtime.includes("SimRuntime.iOS-"));
              const runtimeMatches = iosRuntimes.filter(([runtime]) => runtime.includes(runtimeToken));
              const pool = runtimeMatches.length > 0 ? runtimeMatches : iosRuntimes;
              const available = pool.flatMap(([runtime, devices]) =>
                (devices ?? [])
                  .filter((device) => device.isAvailable)
                  .map((device) => ({ ...device, runtime })),
              );
              const preferred =
                available.find((device) => device.state === "Booted" && device.name === "iPhone 17 Pro") ??
                available.find((device) => device.name === "iPhone 17 Pro") ??
                available.find((device) => device.state === "Booted") ??
                available[0];
              if (!preferred?.udid) process.exit(1);
              process.stdout.write(preferred.udid);
            '
          )"
          xcrun simctl shutdown all || true
          xcrun simctl boot "$UDID" || true
          xcrun simctl bootstatus "$UDID" -b

      - name: Run iOS simulator replay suite
        run: node --experimental-strip-types src/bin.ts test test/integration/replays/ios/simulator --retries 3 --report-junit test/artifacts/replays-ios-simulator.junit.xml

      - name: Run iOS physical device replay suite
        if: env.IOS_UDID != ''
        env:
          IOS_UDID: ${{ vars.IOS_UDID }}
        run: node --experimental-strip-types src/bin.ts test test/integration/replays/ios/device --udid "$IOS_UDID" --retries 3 --report-junit test/artifacts/replays-ios-device.junit.xml

      - name: Upload iOS artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: replay-nightly-ios-artifacts
          if-no-files-found: ignore
          path: |
            ${{ steps.ios-agent-home.outputs.dir }}/daemon.log
            ${{ steps.ios-agent-home.outputs.dir }}/logs/**
            ${{ steps.ios-agent-home.outputs.dir }}/sessions/**
            test/artifacts/**
            test/screenshots/**

  nightly-macos:
    name: macOS Replay Suite
    runs-on: macos-26
    timeout-minutes: 80
    continue-on-error: true
    env:
      AGENT_DEVICE_IOS_RUNNER_DERIVED_PATH: ${{ github.workspace }}/.tmp/macos-runner-derived
      AGENT_DEVICE_IOS_APP_LAUNCH_TIMEOUT_MS: "60000"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup toolchain
        uses: ./.github/actions/setup-node-pnpm

      - name: Resolve Xcode cache key
        id: xcode
        run: |
          set -euo pipefail
          XCODE_VERSION="$(xcodebuild -version | tr '\n' ' ' | sed -E 's/[[:space:]]+/ /g; s/[[:space:]]$//')"
          XCODE_KEY="$(echo "$XCODE_VERSION" | tr ' ' '-' | tr -cd '[:alnum:]._-')"
          echo "key=$XCODE_KEY" >> "$GITHUB_OUTPUT"

      - name: Resolve prebuild source hash
        id: source-hash
        run: |
          set -euo pipefail
          echo "value=${{ hashFiles('ios-runner/**', 'package.json', 'pnpm-lock.yaml') }}" >> "$GITHUB_OUTPUT"

      - name: Cache macOS runner prebuilt
        id: restore-prebuilt
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.2.3
        with:
          path: ${{ env.AGENT_DEVICE_IOS_RUNNER_DERIVED_PATH }}
          key: macos-runner-prebuilt-${{ steps.xcode.outputs.key }}-${{ steps.source-hash.outputs.value }}

      - name: Resolve agent-device home
        id: macos-agent-home
        run: echo "dir=$HOME/.agent-device" >> "$GITHUB_OUTPUT"

      - name: Build macOS XCTest runner
        if: steps.restore-prebuilt.outputs.cache-hit != 'true'
        run: pnpm build:xcuitest:macos

      - name: Build macOS helper
        run: pnpm build:macos-helper

      - name: Run macOS replay suite
        run: node --experimental-strip-types src/bin.ts test test/integration/replays/macos --retries 3 --report-junit test/artifacts/replays-macos.junit.xml

      - name: Upload macOS artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: replay-nightly-macos-artifacts
          if-no-files-found: ignore
          path: |
            ${{ steps.macos-agent-home.outputs.dir }}/daemon.log
            ${{ steps.macos-agent-home.outputs.dir }}/logs/**
            ${{ steps.macos-agent-home.outputs.dir }}/sessions/**
            test/artifacts/**
            test/screenshots/**
