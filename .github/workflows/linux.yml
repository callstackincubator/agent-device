name: Linux

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-linux:
    name: Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      # Force X11 mode (Xvfb) — no Wayland on CI.
      XDG_SESSION_TYPE: x11
      DISPLAY: ":99"
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # Install native build deps BEFORE pnpm install so node-gtk can compile.
      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            xvfb \
            xdotool \
            scrot \
            at-spi2-core \
            libatk-adaptor \
            libglib2.0-dev \
            libgirepository1.0-dev \
            gir1.2-atspi-2.0 \
            gnome-calculator \
            dbus-x11 \
            wmctrl

      - name: Setup toolchain
        uses: ./.github/actions/setup-node-pnpm

      - name: Start Xvfb and D-Bus
        run: |
          # Start virtual framebuffer (1280x1024, 24-bit color)
          Xvfb :99 -screen 0 1280x1024x24 &
          sleep 1

          # Start a D-Bus session and export its env vars for subsequent steps
          eval "$(dbus-launch --sh-syntax)"
          echo "DBUS_SESSION_BUS_ADDRESS=$DBUS_SESSION_BUS_ADDRESS" >> "$GITHUB_ENV"

          # Enable accessibility on the D-Bus session
          export DISPLAY=:99
          # Start the AT-SPI2 registry daemon (path varies by distro)
          ATSPI_REG=$(find /usr -name at-spi2-registryd -type f 2>/dev/null | head -1)
          if [ -n "$ATSPI_REG" ]; then
            "$ATSPI_REG" &
            sleep 1
          else
            echo "WARNING: at-spi2-registryd not found, accessibility tree may be empty"
          fi

      - name: Verify display and tools
        run: |
          echo "--- Display ---"
          xdotool getdisplaygeometry || echo "Display check failed"
          echo "--- xdotool ---"
          xdotool version
          echo "--- scrot ---"
          scrot --version 2>&1 || echo "scrot available"
          echo "--- AT-SPI2 ---"
          python3 -c "import gi; gi.require_version('Atspi', '2.0'); from gi.repository import Atspi; print('AT-SPI2 GI bindings OK')" 2>/dev/null || echo "AT-SPI2 python check skipped"

      - name: Run Linux replay smoke test
        run: |
          pnpm clean:daemon
          node --experimental-strip-types src/bin.ts test test/integration/replays/linux \
            --retries 3 \
            --report-junit test/artifacts/replays-linux.junit.xml

      - name: Upload Linux artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: linux-artifacts
          if-no-files-found: ignore
          path: |
            test/artifacts/**
            test/screenshots/**
